<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Css/style.css">
    <title>Calculator</title>
</head>
<body>
    <Main>
        <Section>
            <P>
                Calculator
            </P>
            <article>
                <input type="number" name="numb" id="Num">
            </article>
            <div>
                <table>
                    <tr>
                        <td>1</td>
                        <td>2</td>
                        <td>3</td>
                        <td>+</td>
                        <td rowspan="3">=</td>
                    </tr>
                    <tr>
                        <td>4</td>
                        <td>5</td>
                        <td>6</td>
                        <td>-</td>
                    </tr>
                    <tr>
                        <td>7</td>
                        <td>8</td>
                        <td>9</td>
                        <td>x</td>
                    </tr>
                    <tr>
                        <td>0</td>
                        <td>/</td>
                        <td>DE</td>
                        <td colspan="2">CE</td>
                    </tr>
                </table>
            </div>
        </Section>
    </Main>
</body>
</html>
