<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <button onclick=" 
    pickComputerMove(); 
    PlayGame('Rock')
    ">Rock</button>
    <button onclick=" 
    pickComputerMove();
    PlayGame('Paper')
    ">Paper</button>
    <button onclick=" 
    pickComputerMove();
    PlayGame('Scissors') 
     ">Scissors</button>
    <script>
         let computerMove = ''
         let result = ''

        function PlayGame(PlayerMove){

            if(PlayerMove === 'Rock'){

            if(computerMove === 'Rock'){
                result = 'Tie'
            } else if(computerMove === 'Paper'){
                result = 'You Lose'
            } else if(computerMove === 'Scissors'){
                result = 'You Win'
            }
            alert(`You picked ${PlayerMove}. Computer picked ${computerMove}. ${result}`)

            } else if (PlayerMove === 'Paper'){

            if(computerMove === 'Rock'){
                result = 'You Win'
            } else if(computerMove === 'Paper'){
                result = 'Tie'
            } else if(computerMove === 'Scissors'){
                result = 'You Lose'
            }
            alert(`You picked ${PlayerMove}. computer picked ${computerMove}. ${result}`)

            } else if(PlayerMove === 'Scissors'){

                if(computerMove === 'Rock'){
                result = 'You Lose'
            } else if(computerMove === 'Paper'){
                result = 'You Win'
            } else if(computerMove === 'Scissors'){
                result = 'Tie'
            }
            alert(`You picked ${PlayerMove}. Computer picked ${computerMove}. ${result}`)
            }

        }

        function pickComputerMove() {

            if(Math.random() >= 0 && Math.random() < 1 / 3){
                computerMove = 'Rock'
                console.log(computerMove)

            } else if(Math.random() >= 1 / 3 && Math.random() < 2 / 3){
                computerMove = 'Paper'
                console.log(computerMove)
            } else if(Math.random() >= 2 / 3 && Math.random() < 1) {
                computerMove = 'Scissors'
                console.log(computerMove)
            }
        }
    </script>
</body>
</html>
