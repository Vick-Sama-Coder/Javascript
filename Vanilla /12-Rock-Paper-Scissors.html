<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<link rel="stylesheet" href="styles/12-Rock-Paper-Scissors.css">
<body>
    <h1>Rock Paper Scissors Game</h1>
    <button class="hand js-rock"
    "><img src="images/Rock-emoji.png" alt=""></button>
    <button class="hand js-paper"
    "><img src="images/Paper-emoji.png" alt=""></button>
    <button class="hand js-scissors"
     "><img src="images/Scissors-emoji.png" alt=""></button>
     <p class="result"></p>
     <p class="moves"></p>
     <p class="reset"></p>
     <p class="score"></p>
     <button class="js-reset-score">Reset score</button>
     <button class="js-auto-play">Auto Play</button></>
    <script src="Scripts/12-Rock-Paper-Scissors.js">
    </script>
</body>
</html>
